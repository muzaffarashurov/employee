databaseChangeLog:
  - changeSet:
      id: 004-insert-roles
      author: developer
      comment: Базовые роли системы. В Spring Security роли обычно с префиксом ROLE_

      changes:
        - insert:
            tableName: roles
            columns:
              - column: { name: name, value: "ROLE_ADMIN" }
              # Админ — полный доступ ко всему

        - insert:
            tableName: roles
            columns:
              - column: { name: name, value: "ROLE_MANAGER" }
              # Менеджер — может читать и обновлять, но не удалять

        - insert:
            tableName: roles
            columns:
              - column: { name: name, value: "ROLE_USER" }
              # Обычный пользователь — только чтение

      rollback:
        - delete:
            tableName: roles
            where: "name IN ('ROLE_ADMIN', 'ROLE_MANAGER', 'ROLE_USER')"

  - changeSet:
      id: 004-insert-test-users
      author: developer
      context: dev
      comment: |
        Тестовые пользователи с разными ролями.
        Пароли захешированы через BCrypt (стоимость 10):
        - admin/admin123
        - manager/manager123  
        - user/user123

      changes:
        # ===== ADMIN =====
        - insert:
            tableName: users
            columns:
              - column: { name: username, value: "admin" }
              - column: { name: password, value: "$2a$10$N9qo8uLOickgx2ZMRZoMy.MqrqQzBZN0UfGNEKjA9L3xzu7OQK1yC" }
              - column: { name: email, value: "admin@company.ru" }
              - column: { name: first_name, value: "Админ" }
              - column: { name: last_name, value: "Админов" }

        - insert:
            tableName: user_roles
            columns:
              - column: { name: user_id, valueNumeric: "1" }
              - column: { name: role_id, valueNumeric: "1" }
              # user_id=1 (admin) -> role_id=1 (ROLE_ADMIN)

        # ===== MANAGER =====
        - insert:
            tableName: users
            columns:
              - column: { name: username, value: "manager" }
              - column: { name: password, value: "$2a$10$N9qo8uLOickgx2ZMRZoMy.MqrqQzBZN0UfGNEKjA9L3xzu7OQK1yC" }
              - column: { name: email, value: "manager@company.ru" }
              - column: { name: first_name, value: "Менеджер" }
              - column: { name: last_name, value: "Менеджеров" }

        - insert:
            tableName: user_roles
            columns:
              - column: { name: user_id, valueNumeric: "2" }
              - column: { name: role_id, valueNumeric: "2" }
              # user_id=2 (manager) -> role_id=2 (ROLE_MANAGER)

        # ===== USER =====
        - insert:
            tableName: users
            columns:
              - column: { name: username, value: "user" }
              - column: { name: password, value: "$2a$10$N9qo8uLOickgx2ZMRZoMy.MqrqQzBZN0UfGNEKjA9L3xzu7OQK1yC" }
              - column: { name: email, value: "user@company.ru" }
              - column: { name: first_name, value: "Юзер" }
              - column: { name: last_name, value: "Юзеров" }

        - insert:
            tableName: user_roles
            columns:
              - column: { name: user_id, valueNumeric: "3" }
              - column: { name: role_id, valueNumeric: "3" }
              # user_id=3 (user) -> role_id=3 (ROLE_USER)

      rollback:
        - delete:
            tableName: users
            where: "username IN ('admin', 'manager', 'user')"