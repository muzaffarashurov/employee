# =============================================================================
# ГЛАВНЫЙ (МАСТЕР) ФАЙЛ LIQUIBASE
# =============================================================================
# Это точка входа для всех миграций. Liquibase читает этот файл первым.
#
# Структура:
# databaseChangeLog — корневой элемент (всегда один на файл)
#   └─ include — подключение других файлов миграций
#   └─ includeAll — подключение ВСЕХ файлов из папки (не рекомендуется для продакшена)
#
# ПРИНЦИП РАБОТЫ:
# 1. Liquibase создает в БД таблицы DATABASECHANGELOG и DATABASECHANGELOGLOCK
# 2. В DATABASECHANGELOG записываются выполненные миграции (id + author + md5)
# 3. При старте приложения Liquibase проверяет: есть ли новые миграции?
# 4. Если есть — выполняет их. Если нет — пропускает.
# 5. Если МД5 сумма изменилась у старой миграции — ОШИБКА! (нельзя менять старые миграции)
# =============================================================================
# ГЛАВНЫЙ (МАСТЕР) ФАЙЛ LIQUIBASE
# =============================================================================
# databaseChangeLog — корневой элемент
#   └─ список элементов (каждый с "-")
#      └─ include, changeSet и т.д.

databaseChangeLog:
  # Комментарии БЕЗ дефиса — просто текст в файле
  # ---------------------------------------------------------------------------
  # ПОДКЛЮЧЕНИЕ ФАЙЛОВ МИГРАЦИЙ
  # ---------------------------------------------------------------------------

  - include:
      file: changes/001-create-employee-table.yaml
      relativeToChangelogFile: true

  - include:
      file: changes/002-insert-test-data.yaml
      relativeToChangelogFile: true
# ---------------------------------------------------------------------------
# ПОДКЛЮЧЕНИЕ ФАЙЛОВ МИГРАЦИЙ
# ---------------------------------------------------------------------------
# Каждый include — отдельный файл с changeSet'ами
# file — путь относительно resources/
# relativeToChangelogFile: true — путь считается от текущего файла (удобнее)

    # Пример добавления новой миграции (после запуска создашь файл):
    # - include:
    #     file: changes/002-add-department-table.yaml
    #     relativeToChangelogFile: true

    # - include:
    #     file: changes/003-add-foreign-key.yaml
    #     relativeToChangelogFile: true

    # ---------------------------------------------------------------------------
    # ПРИМЕР ИСПОЛЬЗОВАНИЯ КОНТЕКСТОВ (для разных сред)
    # ---------------------------------------------------------------------------
    # Контекст 'dev' — миграция выполнится только если spring.liquibase.contexts=dev
    # - include:
    #     file: changes/004-insert-test-data.yaml
    #     relativeToChangelogFile: true
    #     context: dev

    # НОВАЯ МИГРАЦИЯ — вставка данных
    # Выполнится ПОСЛЕ 001 (порядок важен! таблица должна существовать)

  # Комментарии БЕЗ дефиса — просто текст в файле
  # ---------------------------------------------------------------------------
  # ПОДКЛЮЧЕНИЕ ФАЙЛОВ МИГРАЦИЙ
  # ---------------------------------------------------------------------------
