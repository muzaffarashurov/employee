# =============================================================================
# КОНФИГУРАЦИЯ SPRING BOOT ПРИЛОЖЕНИЯ
# =============================================================================
# YAML (YAML Ain't Markup Language) — формат сериализации данных.
# Особенности YAML:
#   - Отступы ВАЖНЫ (2 или 4 пробела, НЕ табы!)
#   - # — комментарий
#   - Структура через вложенность, а не скобки как в JSON/XML

spring:
  # ---------------------------------------------------------------------------
  # ПОДКЛЮЧЕНИЕ К БАЗЕ ДАННЫХ
  # ---------------------------------------------------------------------------
  datasource:
    # JDBC URL:
    #   jdbc:mysql:// — протокол и тип БД
    #   localhost:3306 — хост и порт MySQL
    #   employee_db — имя базы данных
    #   ?createDatabaseIfNotExist=true — создать БД если нет (удобно для обучения)
    #   &useSSL=false — отключить SSL (для локальной разработки)
    #   &serverTimezone=UTC — часовой пояс (избегает предупреждений)
    url: jdbc:mysql://localhost:3306/employee_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

    # УЧЕТНЫЕ ДАННЫЕ MySQL (ИЗМЕНИ ПОД СЕБЯ!)
    username: root
    password: root

    # Класс драйвера MySQL (для Spring Boot 3.x — com.mysql.cj.jdbc.Driver)
    driver-class-name: com.mysql.cj.jdbc.Driver

    # ---------------------------------------------------------------------------
    # НАСТРОЙКИ JPA / HIBERNATE
    # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      # ddl-auto: none — отключаем автосоздание таблиц Hibernate!
      # Таблицы создаем через Liquibase (версионирование важнее автоматики)
      ddl-auto: none

    # Показывать SQL-запросы в консоли (очень полезно для обучения)
    show-sql: true

    properties:
      hibernate:
        # Красивое форматирование SQL (с переносами строк)
        format_sql: true

        # Диалект SQL под конкретную БД (генерация SQL с учетом особенностей MySQL)
        dialect: org.hibernate.dialect.MySQLDialect

  # ---------------------------------------------------------------------------
  # LIQUIBASE — УПРАВЛЕНИЕ МИГРАЦИЯМИ БАЗЫ ДАННЫХ
  # ---------------------------------------------------------------------------
  liquibase:
    # Включить Liquibase (по умолчанию true, но лучше явно указать)
    enabled: true

    # ПУТЬ К ГЛАВНОМУ ФАЙЛУ CHANGELOG
    # classpath:/ — ищем в resources/
    # db/changelog/db.changelog-master.yaml — наш YAML-файл мастер-миграций
    change-log: classpath:/db/changelog/db.changelog-master.yaml

    # drop-first: false — НЕ удалять таблицы перед миграцией!
    # true опасен: стирает все данные при старте. Используй только для тестов.
    drop-first: false

    # Контексты — позволяют запускать разные миграции в разных средах
    # Например: dev, test, prod. Пока не используем.
    contexts: dev

  # ---------------------------------------------------------------------------
  # НАСТРОЙКИ ВЕБ-СЕРВЕРА
  # ---------------------------------------------------------------------------
server:
   # Порт приложения (http://localhost:8080)
  port: 8080
  servlet:
      # Базовый путь для всех endpoints
      # Все API будут начинаться с /api/...
      # Пример: http://localhost:8080/api/employees
    context-path: /api
app:
  jwt:
    # Секретный ключ для подписи токенов. Должен быть длинным и сложным!
    # В продакшене лучше хранить в переменных окружения, не в коде.
    secret: mySuperSecretKeyForJwtTokenThatShouldBeVeryLongAndSecureAtLeast256Bits1234567890abcdef

    # Время жизни access-токена в миллисекундах
    # 86400000 = 24 часа (1 сутки)
    expiration-ms: 86400000

  # ---------------------------------------------------------------------------
  # ЛОГИРОВАНИЕ
  # ---------------------------------------------------------------------------
logging:
  level:
      # Уровень логирования SQL-запросов Hibernate
      # DEBUG — показывает SQL
      # TRACE — показывает SQL + параметры (значения вместо ?)
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    liquibase: DEBUG
    org.springframework.jdbc: DEBUG